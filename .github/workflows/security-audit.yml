name: Security Audit
run-name: "Security audit ‚Äî scan npm dependencies for vulnerabilities"

on:
  schedule:
    # Run every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      # --- Root project ---
      - name: Install root dependencies
        run: npm ci

      - name: Verify package provenance (root)
        run: npm audit signatures 2>&1 | tee /tmp/root-signatures.txt || true

      - name: Run npm audit (root)
        run: npm audit --json > /tmp/root-audit.json 2>/dev/null || true

      - name: Add overrides for root vulnerabilities
        run: |
          node .github/scripts/add-audit-overrides.js /tmp/root-audit.json package.json > /tmp/root-summary.json

      - name: Regenerate root lockfile
        run: npm install --package-lock-only

      # --- Functions project ---
      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Verify package provenance (functions)
        working-directory: functions
        run: npm audit signatures 2>&1 | tee /tmp/functions-signatures.txt || true

      - name: Run npm audit (functions)
        working-directory: functions
        run: npm audit --json > /tmp/functions-audit.json 2>/dev/null || true

      - name: Add overrides for functions vulnerabilities
        run: |
          node .github/scripts/add-audit-overrides.js /tmp/functions-audit.json functions/package.json > /tmp/functions-summary.json

      - name: Regenerate functions lockfile
        working-directory: functions
        run: npm install --package-lock-only

      # --- Check for invalid package signatures ---
      - name: Check for signature failures
        id: signatures
        run: |
          FAILURES=""
          if grep -q "invalid" /tmp/root-signatures.txt 2>/dev/null; then
            FAILURES="$FAILURES\n$(grep 'invalid' /tmp/root-signatures.txt)"
          fi
          if grep -q "invalid" /tmp/functions-signatures.txt 2>/dev/null; then
            FAILURES="$FAILURES\n$(grep 'invalid' /tmp/functions-signatures.txt)"
          fi
          if [ -n "$FAILURES" ]; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
            echo "WARNING: Invalid package signatures detected!"
            printf '%b\n' "$FAILURES"
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
            echo "All package signatures verified successfully."
          fi

      # --- Create PR if changes exist ---
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Build PR description
        if: steps.changes.outputs.has_changes == 'true'
        id: pr-body
        run: |
          {
            echo "body<<EOF"
            node --input-type=module -e "
              import { readFileSync } from 'fs';
              const root = JSON.parse(readFileSync('/tmp/root-summary.json', 'utf8'));
              const funcs = JSON.parse(readFileSync('/tmp/functions-summary.json', 'utf8'));

              const lines = ['## Automated Security Audit Fixes', '', 'This PR was automatically generated by the security audit workflow.'];

              function formatSection(label, summary) {
                if (summary.added.length > 0) {
                  lines.push('', '### ' + label + ' ‚Äî overrides added');
                  summary.added.forEach(a => lines.push('- **' + a.name + '** \u2192 \`' + a.version + '\` (' + a.severity + ') ‚Äî [advisory](' + a.url + ')'));
                }
                if (summary.skipped.length > 0) {
                  lines.push('', '### ' + label + ' ‚Äî no fix available');
                  summary.skipped.forEach(a => lines.push('- **' + a.name + '** (' + a.severity + '): ' + a.reason + ' ‚Äî [advisory](' + a.url + ')'));
                }
              }

              formatSection('Root project', root);
              formatSection('Functions project', funcs);

              // Include signature verification results
              const rootSigs = readFileSync('/tmp/root-signatures.txt', 'utf8').trim();
              const funcsSigs = readFileSync('/tmp/functions-signatures.txt', 'utf8').trim();
              lines.push('', '### Package provenance verification');
              lines.push('**Root project:** ' + rootSigs.split('\n').pop());
              lines.push('**Functions project:** ' + funcsSigs.split('\n').pop());

              lines.push('', '---', 'Please review the overrides and lockfile changes before merging to ensure compatibility.');
              console.log(lines.join('\n'));
            "
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create or update PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ steps.pr-body.outputs.body }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="security/audit-fixes-$DATE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Check if a security audit PR already exists
          EXISTING_PR=$(gh pr list --search "head:security/audit-fixes" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            # Update existing PR branch
            BRANCH=$(gh pr view "$EXISTING_PR" --json headRefName --jq '.headRefName')
          fi

          git checkout -B "$BRANCH"
          git add package.json package-lock.json functions/package.json functions/package-lock.json
          git commit -m "Add security audit overrides ($DATE)" || true
          git push origin "$BRANCH" --force-with-lease

          if [ -n "$EXISTING_PR" ]; then
            echo "Updated existing PR #$EXISTING_PR"
          else
            gh pr create \
              --title "Security: automated audit fixes ($DATE)" \
              --body "$PR_BODY"
            echo "Created new PR on branch $BRANCH"
          fi
