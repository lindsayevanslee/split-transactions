name: Security Audit
run-name: "Security audit — scan npm dependencies for vulnerabilities"

on:
  schedule:
    # Run every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # --- Root project ---
      - name: Install root dependencies
        run: npm ci

      - name: Attempt npm audit fix (root)
        run: npm audit fix --force || true

      - name: Run npm audit (root)
        run: npm audit --json > /tmp/root-audit.json 2>/dev/null || true

      - name: Add overrides for root vulnerabilities
        run: |
          node .github/scripts/add-audit-overrides.js /tmp/root-audit.json package.json > /tmp/root-summary.json

      - name: Regenerate root lockfile
        run: npm install --package-lock-only

      # --- Functions project ---
      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Attempt npm audit fix (functions)
        working-directory: functions
        run: npm audit fix --force || true

      - name: Run npm audit (functions)
        working-directory: functions
        run: npm audit --json > /tmp/functions-audit.json 2>/dev/null || true

      - name: Add overrides for functions vulnerabilities
        run: |
          node .github/scripts/add-audit-overrides.js /tmp/functions-audit.json functions/package.json > /tmp/functions-summary.json

      - name: Regenerate functions lockfile
        working-directory: functions
        run: npm install --package-lock-only

      # --- Create PR if changes exist ---
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Build PR description
        if: steps.changes.outputs.has_changes == 'true'
        id: pr-body
        run: |
          {
            echo "body<<EOF"
            node --input-type=module -e "
              import { readFileSync } from 'fs';
              const root = JSON.parse(readFileSync('/tmp/root-summary.json', 'utf8'));
              const funcs = JSON.parse(readFileSync('/tmp/functions-summary.json', 'utf8'));

              const lines = ['## Automated Security Audit Fixes', '', 'This PR was automatically generated by the security audit workflow.'];

              function formatSection(label, summary) {
                if (summary.added.length > 0) {
                  lines.push('', '### ' + label + ' — overrides added');
                  summary.added.forEach(a => lines.push('- **' + a.name + '** \u2192 \`' + a.version + '\` (' + a.severity + ') — [advisory](' + a.url + ')'));
                }
                if (summary.skipped.length > 0) {
                  lines.push('', '### ' + label + ' — no fix available');
                  summary.skipped.forEach(a => lines.push('- **' + a.name + '** (' + a.severity + '): ' + a.reason + ' — [advisory](' + a.url + ')'));
                }
              }

              formatSection('Root project', root);
              formatSection('Functions project', funcs);
              lines.push('', '---', 'Please review the overrides before merging to ensure compatibility.');
              console.log(lines.join('\n'));
            "
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create or update PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ steps.pr-body.outputs.body }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="security/audit-fixes-$DATE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Check if a security audit PR already exists
          EXISTING_PR=$(gh pr list --search "head:security/audit-fixes" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            # Update existing PR branch
            EXISTING_BRANCH=$(gh pr view "$EXISTING_PR" --json headRefName --jq '.headRefName')
            git checkout -B "$EXISTING_BRANCH"
            git add package.json package-lock.json functions/package.json functions/package-lock.json
            git commit -m "Update security audit overrides ($DATE)" || true
            git push origin "$EXISTING_BRANCH" --force-with-lease
            echo "Updated existing PR #$EXISTING_PR"
          else
            # Create new branch and PR
            git checkout -b "$BRANCH"
            git add package.json package-lock.json functions/package.json functions/package-lock.json
            git commit -m "Add security audit overrides ($DATE)"
            git push origin "$BRANCH"
            gh pr create \
              --title "Security: automated audit fixes ($DATE)" \
              --body "$PR_BODY"
            echo "Created new PR on branch $BRANCH"
          fi
